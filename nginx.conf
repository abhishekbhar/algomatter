worker_processes 1;
pid /tmp/algomatter-nginx.pid;
error_log /tmp/algomatter-nginx-error.log;

events {
    worker_connections 1024;
}

http {
    access_log /tmp/algomatter-nginx-access.log;
    client_body_temp_path /tmp/algomatter-nginx-client-body;
    proxy_temp_path /tmp/algomatter-nginx-proxy;
    fastcgi_temp_path /tmp/algomatter-nginx-fastcgi;
    uwsgi_temp_path /tmp/algomatter-nginx-uwsgi;
    scgi_temp_path /tmp/algomatter-nginx-scgi;

    upstream website {
        server 127.0.0.1:3002;
    }

    upstream app {
        server 127.0.0.1:3001;
    }

    upstream api {
        server 127.0.0.1:8000;
    }

    server {
        listen 3000;
        server_name localhost;

        # Backend API
        location /api/ {
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Frontend app (login, signup, dashboard) — served under /app
        location /app/ {
            proxy_pass http://app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Marketing website (homepage, features, pricing, docs, etc.)
        location / {
            proxy_pass http://website;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
